<div id="scroll-progress-bar"></div>

<script>
    (function() {
        // ===== UI 数据注入：将 Hugo data/ui.yaml 注入 JS 运行时 =====
        var uiData = {{ hugo.Data.ui | jsonify | safeJS }};

        // ===== TOC 折叠箭头功能 =====
        {{ partial "modules/toc.html" . }}

        // ===== 返回顶部按钮 =====
        function initBackToTop() {
            const topLink = document.querySelector('.top-link');
            if (!topLink) return;

            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    topLink.classList.add('visible');
                } else {
                    topLink.classList.remove('visible');
                }
            });

            topLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ===== 代码块复制按钮 (SVG 极简图标) =====
        {{ partial "modules/copy-button.html" . }}

        // ===== 顶部水平进度条 (宽度百分比驱动) =====
        function initScrollProgress() {
            const bar = document.getElementById('scroll-progress-bar');
            if (!bar) return;
            window.addEventListener('scroll', () => {
                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - window.innerHeight;
                const scrolled = (winScroll / height) * 100;
                bar.style.width = scrolled + '%';
            });
        }

        // ===== 打字机问候语 + 页面特效 (Mermaid) =====
        {{ partial "modules/effects.html" . }}

        // ===== 三栏 Grid 布局：TOC + Main + Sidebar =====
        function initLayoutWrapper() {
            // 首页：跳过 Grid 包装，Spatial UI 自包含
            if (document.querySelector('.home-spatial')) return;

            const main = document.querySelector('.main');
            if (!main) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'layout-wrapper';

            // 提取 TOC（PaperMod 将 .toc 渲染在文章内容中）
            const toc = document.querySelector('.toc');
            if (toc) {
                wrapper.classList.add('has-toc');
                toc.remove();
                wrapper.appendChild(toc);
            }

            // 将 .main 移入 grid 容器
            main.parentNode.insertBefore(wrapper, main);
            wrapper.appendChild(main);

            // 创建右侧栏（首页不渲染，添加 .no-sidebar 类）
            const sidebar = createSidebar();
            if (sidebar) {
                wrapper.appendChild(sidebar);
            } else {
                wrapper.classList.add('no-sidebar');
            }
        }

        // ===== 右侧栏 Sidebar (数据驱动, 独立模块) =====
        {{ partial "modules/sidebar.html" . }}

        // ===== 空间悬浮导航 (Spatial UI) — Canvas 粒子 + 磁吸 =====
        {{ partial "modules/spatial-motion.html" . }}

        // 执行初始化
        document.addEventListener('DOMContentLoaded', () => {
            initLayoutWrapper();
            initTOC();
            initBackToTop();
            initCopyButtons();
            initScrollProgress();
            initDynamicGreeting();
            initMermaid();
            initSpatialUI();
        });
    })();
</script>
