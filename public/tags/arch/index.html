<script>
    (function() {
        
        function initTOC() {
            if (window.innerWidth < 1300) return;
            const toc = document.querySelector('.toc');
            if (!toc) return;

            const listItems = toc.querySelectorAll('li');
            listItems.forEach(li => {
                const childUl = li.querySelector('ul');
                if (childUl) {
                    const btn = document.createElement('span');
                    btn.className = 'toc-arrow';
                    btn.innerText = '▶';
                    li.insertBefore(btn, li.firstChild);
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        li.classList.toggle('is-active');
                    });
                } else {
                    const spacer = document.createElement('span');
                    spacer.className = 'toc-arrow';
                    spacer.style.visibility = 'hidden';
                    spacer.innerText = '▶';
                    li.insertBefore(spacer, li.firstChild);
                }
            });

            const activeLink = toc.querySelector('a[href="' + location.hash + '"]');
            if (activeLink) {
                let parentLi = activeLink.closest('li');
                while (parentLi) {
                    parentLi.classList.add('is-active');
                    parentLi = parentLi.parentElement.closest('li');
                }
            }
        }

        
        function initBackToTop() {
            const topLink = document.querySelector('.top-link');
            if (!topLink) return;

            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    topLink.classList.add('visible');
                } else {
                    topLink.classList.remove('visible');
                }
            });

            topLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        
        function initCopyButtons() {
            const pres = document.querySelectorAll('.post-content pre');
            pres.forEach(pre => {
                if (pre.querySelector('.copy-code-button')) return;
                const button = document.createElement('button');
                button.className = 'copy-code-button';
                button.innerHTML = '📋';
                button.setAttribute('aria-label', '复制代码');
                button.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const code = pre.querySelector('code') || pre;
                    const text = code.innerText;
                    try {
                        await navigator.clipboard.writeText(text);
                        button.innerHTML = '✓';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.innerHTML = '📋';
                            button.classList.remove('copied');
                        }, 2000);
                    } catch (err) {
                        button.innerHTML = '❌';
                        setTimeout(() => {
                            button.innerHTML = '📋';
                        }, 1000);
                    }
                });
                pre.style.position = 'relative';
                pre.appendChild(button);
            });
        }

        
        function initScrollProgress() {
            const bar = document.getElementById('scroll-progress-bar');
            if (!bar) return;
            window.addEventListener('scroll', () => {
                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - window.innerHeight;
                const scrolled = (winScroll / height) * 100;
                bar.style.height = scrolled + '%';
            });
        }

        
        function initDynamicGreeting() {
            
            const greetingEle = document.getElementById('dynamic-greeting');
            if (!greetingEle) return;

            const hour = new Date().getHours();
            let greeting = "你好";
            let icon = "👋";

            if (hour >= 5 && hour < 11) {
                greeting = "早上好";
                icon = "🌅";
            } else if (hour >= 11 && hour < 14) {
                greeting = "中午好";
                icon = "☀️";
            } else if (hour >= 14 && hour < 18) {
                greeting = "下午好";
                icon = "☕";
            } else if (hour >= 18 && hour < 23) {
                greeting = "晚上好";
                icon = "🌙";
            } else {
                greeting = "夜深了，注意休息";
                icon = "🦉";
            }

            
            greetingEle.style.opacity = '0';
            setTimeout(() => {
                greetingEle.innerText = `${greeting}，我是 QIZHI ${icon}`;
                greetingEle.style.opacity = '1';
                greetingEle.style.transition = 'opacity 0.5s ease';
            }, 100);
        }

        
        document.addEventListener('DOMContentLoaded', () => {
            initTOC();
            initBackToTop();
            initCopyButtons();
            initScrollProgress();
            initDynamicGreeting();
        });
    })();
</script>

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
