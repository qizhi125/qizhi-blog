baseURL = 'https://qizhi1215.com/'
languageCode = 'zh-cn'
title = 'QIZHI Tech Blog'
theme = 'PaperMod'

# 启用搜索功能的必要配置
[outputs]
    home = ["HTML", "RSS", "JSON"]

[params]
    env = "production"
    title = "QIZHI Tech Blog"
    description = "Focus on C++, Linux Kernel, and System Security."
    keywords = ["C++", "Linux", "Fedora", "Security"]
    author = "QIZHI"
    ShowToc = true
    TocOpen = true

    # 界面设置
    defaultTheme = "auto"
    ShowShareButtons = false
    ShowReadingTime = true
    ShowBreadCrumbs = true
    displayFullContent = false

    # ❌ 禁用 ProfileMode (它不显示文章列表)
    [params.profileMode]
    enabled = false

    # ✅ 开启 HomeInfo 模式
    [params.homeInfoParams]
    Title = ""

    # 👇 关键修改：这里的每一行都必须顶格写，前面不能有空格！
    Content = """
<img src="/image/avatar.png" alt="avatar" style="width:120px;height:120px;border-radius:50%;margin:0 auto 1rem auto;box-shadow: 0 4px 10px rgba(0,0,0,0.1);display:block;">

<h1 id="dynamic-greeting" style="font-size: 2rem; margin-bottom: 0.5rem;">QIZHI</h1>

<p style="margin-bottom: 1.5rem; color: var(--secondary);">💻 Linux System Developer | C++ Enthusiast</p>

<div class="buttons" style="display: flex; justify-content: center; gap: 10px;">
    <a class="button" href="https://github.com/qizhi125" rel="noopener" title="My Projects" style="text-decoration: none;">
        <span class="button-inner">My Projects</span>
    </a>
    <a class="button" href="/posts/arch-linux/" rel="noopener" title="Arch Linux Note" style="text-decoration: none;">
        <span class="button-inner">Arch Linux Note</span>
    </a>
</div>
"""

    # 🔗 社交图标
    [[params.socialIcons]]
    name = "github"
    url = "https://github.com/qizhi125"
    [[params.socialIcons]]
    name = "bilibili"
    url = "https://space.bilibili.com/349491449"
    [[params.socialIcons]]
    name = "email"
    url = "mailto:qizhi1215w@gmail.com"

# 🧭 顶部导航栏菜单
[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 10
    [[menu.main]]
        identifier = "archives"
        name = "Archives"
        url = "/archives"
        weight = 20
    [[menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags"
        weight = 30
    [[menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search"
        weight = 40

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true

    [markup.tableOfContents]
        startLevel = 2
        endLevel = 4